name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17'}
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
      - run: pip install --user buildozer && echo "$HOME/.local/bin" >> $GITHUB_PATH
      - run: |
          cd android_app
          buildozer -v android debug
        env: {BUILDOZER_WARN_ON_ROOT: 1}
      - uses: actions/upload-artifact@v4
        with: {name: apk, path: android_app/bin/*.apk, retention-days: 30}
