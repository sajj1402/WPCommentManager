name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git zip unzip openjdk-17-jdk python3-pip python3-dev \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev \
            build-essential ccache
            
      - name: Install Python build deps
        run: |
          pip install --user cython buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          
      - name: Show environment
        run: |
          java -version
          python3 --version
          buildozer version
          ls -la android_app/
          
      - name: Build APK (verbose)
        run: |
          cd android_app
          buildozer -v android debug 2>&1 | tee build.log
        env:
          BUILDOZER_WARN_ON_ROOT: 1
          
      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android_app/build.log
          retention-days: 30
          
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wpcommentmanager-apk
          path: android_app/bin/*.apk
          retention-days: 30
